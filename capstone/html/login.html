<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTC Login</title>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>

    <div class="header">
        <img src="../assets/logo-ptc.png" alt="PTC Logo" class="logo">
        <h1>PATEROS TECHNOLOGICAL COLLEGE</h1>
    </div>

    <div class="login-container" id="auth-container">
        <div id="login-box">
            <h2>Login</h2>
            <p>Please log in into your account</p>
        <form class="login-form" id="login-form">
            <label>Email</label>
            <input type="email" id="email" placeholder="   Ptc email" required>
            
            <label>Password</label>
            <div class="password-wrapper">
                <input type="password" id="password" placeholder="   ************" required>
            </div>
            <button type="submit">Sign in</button>
        </form>
        </div>
        <p id="message" class="message"></p>
    </div>
</div>  
<script src="../javascript/login.js"></script>
</body>
</html>
